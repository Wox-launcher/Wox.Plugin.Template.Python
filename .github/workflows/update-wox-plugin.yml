name: Update wox-plugin dependency

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-wox-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Update wox-plugin version
        id: update
        shell: bash
        run: |
          python <<'PY'
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          pyproject_path = Path('pyproject.toml')
          github_output_path = Path(os.environ['GITHUB_OUTPUT'])
          content = pyproject_path.read_text()
          match = re.search(r'wox-plugin==([^"\]]+)', content)
          if match is None:
              raise SystemExit('Could not find pinned wox-plugin dependency in pyproject.toml')

          current_version = match.group(1)
          with urllib.request.urlopen('https://pypi.org/pypi/wox-plugin/json', timeout=30) as response:
              payload = json.load(response)

          latest_version = payload['info']['version']
          print(f'Current version: {current_version}')
          print(f'Latest version: {latest_version}')

          if current_version == latest_version:
              github_output_path.write_text(f'changed=false\nversion={latest_version}\n')
              print('No update needed.')
              raise SystemExit(0)

          updated_content = re.sub(
              r'wox-plugin==[^"\]]+',
              f'wox-plugin=={latest_version}',
              content,
              count=1,
          )
          pyproject_path.write_text(updated_content)
          github_output_path.write_text(f'changed=true\nversion={latest_version}\n')
          print('Updated pyproject.toml')
          PY

      - name: Refresh lock file
        if: steps.update.outputs.changed == 'true'
        run: uv lock

      - name: Create pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: update wox-plugin to ${{ steps.update.outputs.version }}'
          branch: 'ci/update-wox-plugin'
          delete-branch: true
          title: 'chore: update wox-plugin to ${{ steps.update.outputs.version }}'
          body: |
            Updates the pinned `wox-plugin` dependency to the latest version published on PyPI.

            This PR was created automatically by GitHub Actions.
          labels: dependencies
